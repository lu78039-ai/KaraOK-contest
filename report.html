<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡拉OK大賽總成績表 - 列印</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <style>
        /* 列印專用樣式 */
        @media print {
            body { background: white !important; color: black !important; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .report-container { box-shadow: none !important; border: none !important; width: 100% !important; max-width: none !important; padding: 0 !important; }
            table { border-collapse: collapse; width: 100%; font-size: 10pt; }
            th, td { border: 1px solid black !important; color: black !important; padding: 6px !important; }
            th { background: #f0f0f0 !important; -webkit-print-color-adjust: exact; }
            h1 { color: black !important; }
        }

        body {
            background: #1a1c1e;
            color: #e2e8f0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            padding: 40px 20px;
            height: auto;      /* 覆寫 style.css 的 100dvh */
            overflow: visible; /* 覆寫 style.css 的 hidden */
        }

        .report-container {
            max-width: 1000px;
            margin: 0 auto;
            background: #2d3139;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .report-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 20px;
        }

        .report-header h1 {
            margin: 0;
            font-size: 2rem;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #1e2126;
        }

        th, td {
            padding: 12px;
            border: 1px solid #3f444e;
            text-align: center;
        }

        th {
            background: #363b45;
            font-weight: 800;
            color: var(--secondary-color);
        }

        .team-col { text-align: left; font-weight: bold; }
        .score-col { color: #f59e0b; font-weight: 700; }
        .total-col { background: rgba(16, 185, 129, 0.1); font-weight: 900; color: #10b981; }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .action-btn {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .print-btn { background: #6366f1; color: white; }
        .toggle-btn { background: #f59e0b; color: white; }
        .back-btn { background: #4b5563; color: white; }
        .action-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .judge-cell.hidden { display: none !important; }

        #loading { text-align: center; padding: 40px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="report-container">
        <div class="btn-group no-print">
            <a href="index.html" class="action-btn back-btn" style="text-decoration: none;">🏠 返回首頁</a>
            <button id="toggleJudgesBtn" class="action-btn toggle-btn">👁️ 隱藏評審明細</button>
            <button onclick="window.print()" class="action-btn print-btn">🖨️ 列印此表 (A4)</button>
        </div>

        <div class="report-header">
            <h1>卡拉 OK 大賽 - 總成績評分明細表</h1>
            <p id="printDate"></p>
        </div>

        <div id="loadingReport">正在彙整成績資料...</div>
        
        <div id="tableWrapper" class="hidden">
            <table id="reportTable">
                <thead>
                    <tr id="headerRow">
                        <!-- 動態生成標頭 -->
                    </tr>
                </thead>
                <tbody id="reportContent">
                    <!-- 動態生成內容 -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="report.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initReport);
        function showView(viewId) { if (viewId === 'homeView') location.href = 'index.html'; }
    </script>
</body>
</html>
