<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>參賽報名 - 卡拉 OK 大賽</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body class="register-page">
    <div id="registerView" class="register-container">
        <div id="statusBanner" class="status-banner hidden"></div>

        <div class="register-tabs" style="display:flex; gap:10px; margin-bottom:20px; justify-content:center;">
            <button onclick="switchRegTab('new')" id="tab-new" class="nav-btn active" style="width:auto; padding:8px 24px;">📝 新報名</button>
            <button onclick="switchRegTab('edit')" id="tab-edit" class="nav-btn" style="width:auto; padding:8px 24px;">✏️ 修改資料</button>
        </div>

        <!-- 區塊：新報名 -->
        <div id="newRegSection">
            <div id="registerBox" class="register-box">
                <header>
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
                        <h2 style="margin: 0; flex: 1;">🎤 參賽報名系統</h2>
                    </div>
                    <p>請填寫以下資訊完成比賽登記</p>
                </header>

                <form id="registerForm">
                    <div class="form-group" style="grid-column: span 2;">
                        <label>參賽者名單 (每位成員皆需填寫班級座號)</label>
                        <div id="membersContainer">
                            <div class="member-input-row" style="display:grid; grid-template-columns: 0.8fr 0.8fr 1.2fr 40px; gap:8px; margin-bottom:8px;">
                                <input type="text" class="m-class" placeholder="班級" required>
                                <input type="number" class="m-seat" placeholder="座號" required>
                                <input type="text" class="m-name" placeholder="姓名" required>
                                <div style="width:40px;"></div>
                            </div>
                        </div>
                        <button type="button" class="nav-btn" style="width:auto; padding:8px 16px; margin-top:4px;" onclick="addMemberField()">＋ 新增成員</button>
                    </div>

                    <div class="form-group">
                        <label for="teamName">隊伍名稱</label>
                        <input type="text" id="teamName" placeholder="為您的隊伍取個響亮的名稱" required>
                    </div>

                    <div class="form-group">
                        <label for="song">參賽曲目</label>
                        <input type="text" id="song" placeholder="請輸入完整的歌曲名稱" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="videoUrl">影片連結</label>
                        <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
                    </div>

                    <div style="margin-top: 30px;">
                        <button type="button" class="submit-btn" onclick="showRegisterPreview()">預覽報名資訊</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 區塊：修改資料 -->
        <div id="editRegSection" class="hidden">
            <div class="register-box">
                <header>
                    <h2>✏️ 修改報名資訊</h2>
                    <p>輸入報名序號與組長姓名進行查詢</p>
                </header>
                <div id="searchSection">
                    <div class="form-group"><label>報名序號</label><input type="number" id="editRegId" placeholder="例如：22"></div>
                    <div class="form-group"><label>組員姓名</label><input type="text" id="editMemberName" placeholder="請輸入姓名"></div>
                    <button type="button" class="submit-btn" onclick="findMyRegistration()" style="margin-top:20px;">搜尋我的資料</button>
                </div>
                
                <div id="updateFormSection" class="hidden" style="margin-top:30px; padding-top:30px; border-top:2px solid var(--border-color);">
                    <div style="background:var(--primary-color); color:white; padding:10px; border-radius:8px; margin-bottom:20px; font-weight:bold; text-align:center;">
                        報名序號：<span id="editRegIdDisplay"></span>
                    </div>
                    <div class="form-group">
                        <label>參賽成員名單</label>
                        <div id="editMembersContainer"></div>
                        <button type="button" class="nav-btn" style="width:auto; padding:8px 16px; margin-top:10px;" onclick="addMemberFieldToEdit()">＋ 新增成員</button>
                    </div>

                    <div class="form-group" style="margin-top:20px;">
                        <label>隊伍名稱</label>
                        <input type="text" id="editTeamName" required>
                    </div>
                    <div class="form-group"><label>新曲目名稱</label><input type="text" id="editSong" required></div>
                    <div class="form-group"><label>新影片連結</label><input type="url" id="editVideo" placeholder="https://..."></div>

                    <button type="button" class="submit-btn" onclick="submitFullRegistrationUpdate()" style="margin-top:20px;">確認修改資料</button>
                </div>
            </div>
        </div>

        <!-- 預覽確認畫面 -->
        <div id="previewScreen" class="register-box hidden" style="font-size: 16px;">
            <h2 style="background:none; -webkit-text-fill-color: var(--primary-color); color: var(--primary-color);">確認報名資訊</h2>
            <p>請再次確認以下資訊是否正確</p>
            
            <div class="preview-details" style="background: var(--bg-color); border: 2px solid var(--border-color); padding:24px; border-radius:12px; margin-bottom:24px; text-align:left; font-size:16px; line-height:1.6;">
                <div style="margin-bottom:12px;"><span style="color:var(--text-muted);">隊名：</span><span id="p-team" style="font-weight:bold; color: var(--text-main);"></span></div>
                <div style="margin-bottom:12px; display: flex; align-items: flex-start; gap: 4px;">
                    <span style="color:var(--text-muted); white-space: nowrap;">成員明細：</span>
                    <span id="p-members-list" style="font-weight:bold; color: var(--text-main);"></span>
                </div>
                <div style="margin-bottom:12px;"><span style="color:var(--text-muted);">曲目：</span><span id="p-song" style="font-weight:bold; color: var(--text-main);"></span></div>
                <div style="margin-bottom:12px;"><span style="color:var(--text-muted);">影片：</span><span id="p-video" style="font-weight:bold; word-break: break-all; color: var(--text-main);"></span></div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <button type="button" onclick="closePreview()" class="nav-btn" style="padding:16px;">返回修改</button>
                <button type="button" id="confirmSubmitBtn" class="submit-btn" onclick="submitRegistration()">確認送出報名</button>
            </div>
        </div>

        <!-- 報名成功畫面 -->
        <div id="successScreen" class="register-box success-screen hidden">
            <div class="success-icon">✅</div>
            <h2>報名成功！</h2>
            <p>您的資料已成功寫入系統，請牢記報名序號做為修改的依據：</p>
            <div id="regIdDisplay" class="reg-id-badge">000</div>
            <p style="font-size: 0.9rem; color:var(--text-muted);">註：出場序將於報名截止後統一公告。</p>
            <div style="margin-top: 30px;">
                <button onclick="location.reload()" class="submit-btn" style="background:var(--surface-color); border:1px solid var(--border-color); margin-bottom:10px;">繼續報名下一組</button>
            </div>
        </div>

        <!-- 報名截止畫面 -->
        <div id="closedScreen" class="register-box hidden">
            <div style="text-align:center; padding: 40px;">
                <div style="font-size:5rem; margin-bottom:20px;">⏰</div>
                <h2 style="background:none; -webkit-text-fill-color: var(--danger-color); color: var(--danger-color);">報名已截止</h2>
                <p>很抱歉，本屆賽事報名時間已結束。</p>
                <div id="deadlineInfo" style="margin: 20px 0; color: var(--text-muted);"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="register.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initRegister);
    </script>
</body>
</html>
